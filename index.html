<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild West: Zombie Waves</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #2c1b0e; font-family: 'Rye', serif; overflow: hidden; touch-action: none; }
        #menu, #game-over {
            position: absolute; width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 10;
        }
        .parchment {
            background: #f4e4bc; padding: 30px; border: 12px solid #5d4037;
            box-shadow: 0 0 50px #000; text-align: center; border-radius: 5px; width: 300px;
        }
        .menu-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: #8d6e63; color: #fff; border: 3px solid #4e342e;
            font-family: 'Rye', serif; font-size: 1.2rem; cursor: pointer;
        }
        #ui { position: absolute; top: 10px; left: 10px; color: #f4e4bc; text-shadow: 2px 2px #000; pointer-events: none; }
        #announcer {
            position: absolute; top: 40%; width: 100%; text-align: center;
            font-size: 3rem; color: #ffeb3b; text-shadow: 4px 4px #000;
            display: none; pointer-events: none;
        }
        canvas { display: block; background: #4d3a2b; }
    </style>
</head>
<body>
 
<div id="ui">WAVE: <span id="wave-val">1</span> | HP: <span id="hp-val">100</span></div>
<div id="announcer">WAVE 1 STARTED</div>
 
<div id="menu">
    <div class="parchment">
        <h1>WANTED</h1>
        <button class="menu-btn" id="start-btn">START HUNT</button>
    </div>
</div>
 
<div id="game-over" style="display:none;">
    <div class="parchment">
        <h1>DIED</h1>
        <p id="final-stats"></p>
        <button class="menu-btn" onclick="location.reload()">RETRY</button>
    </div>
</div>
 
<canvas id="gameCanvas"></canvas>
 
<!-- We use type="module" to allow class separation -->
<script type="module" src="game.js"></script>
</body>
</html>
