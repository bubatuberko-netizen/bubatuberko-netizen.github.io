<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Token Clicker</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(#ffffff, #dceeff);
        color: #0038b8;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
    }

    #cube {
        width: 120px;
        height: 120px;
        background: black;
        margin: 40px auto;
        cursor: pointer;
        transition: transform 0.1s;
    }

    #cube:active {
        transform: scale(0.9);
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        background: #0038b8;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #0050ff;
    }

    #gameArea {
        margin-top: 30px;
    }

    #result {
        font-size: 20px;
        margin-top: 10px;
    }
</style>
</head>
<body>

<h1>🧊 Token Clicker</h1>

<h2>Tokens: <span id="tokens">0</span></h2>

<div id="cube"></div>

<button onclick="playRisk()">Play Risk Game</button>
<button onclick="reset()">Reset</button>

<div id="gameArea">
    <p id="result"></p>
</div>

<script>
let tokens = parseInt(localStorage.getItem("tokens")) || 0;

const tokenDisplay = document.getElementById("tokens");
const cube = document.getElementById("cube");
const result = document.getElementById("result");

function update() {
    tokenDisplay.innerText = tokens;
    localStorage.setItem("tokens", tokens);
}

cube.onclick = () => {
    tokens += 1;
    update();
};

// Risk-based mini-game (NOT gambling)
function playRisk() {
    if (tokens < 5) {
        result.innerText = "Need at least 5 tokens!";
        return;
    }

    tokens -= 5;

    let outcome = Math.random();

    if (outcome < 0.5) {
        tokens += 10;
        result.innerText = "✅ You doubled your tokens!";
    } else if (outcome < 0.8) {
        tokens += 5;
        result.innerText = "😐 You broke even.";
    } else {
        result.innerText = "❌ You lost your tokens!";
    }

    update();
}

function reset() {
    tokens = 0;
    update();
    result.innerText = "";
}

update();
</script>

</body>
</html>
