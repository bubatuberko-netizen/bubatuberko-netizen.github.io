<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wild West Shooter</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #222;
        color: white;
        text-align: center;
    }

    #menu {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(#c19a6b, #8b5a2b);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    #menu h1 {
        font-size: 48px;
        margin-bottom: 20px;
    }

    #menu button {
        padding: 10px 20px;
        font-size: 20px;
        cursor: pointer;
    }

    canvas {
        display: none;
        background: linear-gradient(#f4a460, #deb887);
    }

    #hud {
        position: absolute;
        top: 10px;
        left: 10px;
        display: none;
    }
</style>
</head>
<body>

<div id="menu">
    <h1>Wild West Shooter</h1>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>

<script>
class Game {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext("2d");

        this.resize();
        window.addEventListener("resize", () => this.resize());

        this.player = new Player(this);
        this.bullets = [];
        this.enemies = [];
        this.score = 0;

        this.lastSpawn = 0;

        this.keys = {};
        window.addEventListener("keydown", e => this.keys[e.key] = true);
        window.addEventListener("keyup", e => this.keys[e.key] = false);

        canvas.addEventListener("click", () => this.shoot());

        this.loop = this.loop.bind(this);
    }

    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    }

    shoot() {
        this.bullets.push(new Bullet(this, this.player.x, this.player.y));
    }

    spawnEnemy() {
        this.enemies.push(new Enemy(this));
    }

    update(delta) {
        this.player.update(this.keys);

        this.bullets.forEach(b => b.update());
        this.enemies.forEach(e => e.update());

        // Collision
        this.bullets.forEach((b, bi) => {
            this.enemies.forEach((e, ei) => {
                if (b.collides(e)) {
                    this.bullets.splice(bi, 1);
                    this.enemies.splice(ei, 1);
                    this.score++;
                    document.getElementById("score").textContent = this.score;
                }
            });
        });

        // Remove off-screen bullets
        this.bullets = this.bullets.filter(b => b.y > 0);

        // Spawn enemies
        if (Date.now() - this.lastSpawn > 1000) {
            this.spawnEnemy();
            this.lastSpawn = Date.now();
        }
    }

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        this.player.draw(this.ctx);
        this.bullets.forEach(b => b.draw(this.ctx));
        this.enemies.forEach(e => e.draw(this.ctx));
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(this.loop);
    }

    start() {
        this.loop();
    }
}

class Player {
    constructor(game) {
        this.game = game;
        this.x = game.canvas.width / 2;
        this.y = game.canvas.height - 60;
        this.speed = 5;
        this.size = 30;
    }

    update(keys) {
        if (keys["a"] || keys["ArrowLeft"]) this.x -= this.speed;
        if (keys["d"] || keys["ArrowRight"]) this.x += this.speed;

        // Clamp
        this.x = Math.max(this.size, Math.min(this.game.canvas.width - this.size, this.x));
    }

    draw(ctx) {
        ctx.fillStyle = "brown";
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);

        // simple hat animation
        ctx.fillStyle = "black";
        ctx.fillRect(this.x - 15, this.y - 25, 30, 10);
    }
}

class Bullet {
    constructor(game, x, y) {
        this.game = game;
        this.x = x;
        this.y = y;
        this.speed = 7;
        this.size = 5;
    }

    update() {
        this.y -= this.speed;
    }

    draw(ctx) {
        ctx.fillStyle = "yellow";
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    }

    collides(enemy) {
        return (
            this.x < enemy.x + enemy.size &&
            this.x > enemy.x - enemy.size &&
            this.y < enemy.y + enemy.size &&
            this.y > enemy.y - enemy.size
        );
    }
}

class Enemy {
    constructor(game) {
        this.game = game;
        this.size = 30;
        this.x = Math.random() * game.canvas.width;
        this.y = -this.size;
        this.speed = 2 + Math.random() * 2;
    }

    update() {
        this.y += this.speed;
    }

    draw(ctx) {
        ctx.fillStyle = "darkred";
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);

        // simple animation (eyes)
        ctx.fillStyle = "white";
        ctx.fillRect(this.x - 10, this.y - 5, 5, 5);
        ctx.fillRect(this.x + 5, this.y - 5, 5, 5);
    }
}

// Game control
let game;

function startGame() {
    document.getElementById("menu").style.display = "none";
    const canvas = document.getElementById("gameCanvas");
    const hud = document.getElementById("hud");

    canvas.style.display = "block";
    hud.style.display = "block";

    game = new Game(canvas);
    game.start();
}
</script>

</body>
</html>
