<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D FPS</title>
<style>
    body { margin: 0; overflow: hidden; background: black; }
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-family: monospace;
        font-size: 18px;
    }
    #start {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        background: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="ui">Score: 0</div>
<div id="start">Click to Start</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let controlsEnabled = false;
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
let enemies = [];
let score = 0;

const ui = document.getElementById("ui");
const startBtn = document.getElementById("start");

// Setup scene
scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 1, 1000);

renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Floor
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshBasicMaterial({ color: 0x444444 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// Light
const light = new THREE.HemisphereLight(0xffffff, 0x444444);
scene.add(light);

// Player
camera.position.y = 2;

// Mouse look
let yaw = 0, pitch = 0;

document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

document.addEventListener("pointerlockchange", () => {
    controlsEnabled = document.pointerLockElement === document.body;
    startBtn.style.display = "none";
});

document.addEventListener("mousemove", e => {
    if (!controlsEnabled) return;

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));

    camera.rotation.set(pitch, yaw, 0);
});

// Movement
const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Shooting
document.addEventListener("mousedown", () => {
    if (!controlsEnabled) return;

    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);

    const intersects = ray.intersectObjects(enemies);
    if (intersects.length > 0) {
        const hit = intersects[0].object;
        scene.remove(hit);
        enemies = enemies.filter(e => e !== hit);
        score++;
        ui.innerText = "Score: " + score;
    }
});

// Spawn enemies
function spawnEnemy() {
    const geo = new THREE.BoxGeometry(2,2,2);
    const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
    const enemy = new THREE.Mesh(geo, mat);

    enemy.position.set(
        (Math.random()-0.5)*100,
        1,
        (Math.random()-0.5)*100
    );

    scene.add(enemy);
    enemies.push(enemy);

    setTimeout(spawnEnemy, 2000);
}
spawnEnemy();

// Game loop
function animate() {
    requestAnimationFrame(animate);

    if (controlsEnabled) {
        direction.set(0,0,0);

        if (keys["w"]) direction.z -= 1;
        if (keys["s"]) direction.z += 1;
        if (keys["a"]) direction.x -= 1;
        if (keys["d"]) direction.x += 1;

        direction.normalize();

        const speed = 0.2;

        camera.position.x += direction.x * speed * Math.cos(yaw);
        camera.position.z += direction.z * speed * Math.cos(yaw);

        // Enemy AI
        enemies.forEach(enemy => {
            const dx = camera.position.x - enemy.position.x;
            const dz = camera.position.z - enemy.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);

            enemy.position.x += dx / dist * 0.03;
            enemy.position.z += dz / dist * 0.03;

            if (dist < 2) {
                alert("Game Over! Score: " + score);
                location.reload();
            }
        });
    }

    renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
