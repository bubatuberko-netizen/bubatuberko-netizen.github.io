<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild West Zombie Survival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <div id="menu-screen" class="screen active">
            <h1 class="title">Wild West<br><span>Zombies</span></h1>
            <div class="menu-box">
                <input type="text" id="username" placeholder="Enter Cowboy Name" maxlength="12">
                <button id="btn-start" class="btn">Start Survival</button>
                <button id="btn-scores" class="btn">View Bounties</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="hud">
                <div>Bounty: $<span id="score-display">0</span></div>
                <div>Name: <span id="player-name-display"></span></div>
            </div>
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>

        <div id="scoreboard-screen" class="screen">
            <h1 class="title">Top Bounties</h1>
            <div class="menu-box">
                <ul id="score-list"></ul>
                <button id="btn-back" class="btn">Back to Saloon</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
